name: Deploy

on:
  push:
    branches: [develop, main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente"
        required: true
        default: "testing"
        type: choice
        options: ["testing", "production"]

jobs:
  deploy-testing:
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'testing')
    runs-on: ubuntu-latest
    environment: testing
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Run tests
        run: |
          pip install -r requirements.txt pytest
          python -m pytest tests/ -x --tb=short

      - name: Deploy to Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master
        with:
          version: 0.2.129
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Notify Telegram
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            MSG="🧪 Deploy TESTING a Fly.io completado - $(date +'%H:%M')"
          else
            MSG="❌ Deploy TESTING FALLÓ - $(date +'%H:%M')"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=6475885611" -d "text=$MSG"

  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          pip install -r requirements.txt pytest
          python -m pytest tests/ -x --tb=short
      - name: Deploy to PythonAnywhere via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ssh.pythonanywhere.com
          port: 22
          username: ${{ secrets.PYTHONANYWHERE_USERNAME }}
          key: ${{ secrets.PYTHONANYWHERE_SSH_KEY }}
          script: |
            mkdir -p ~/magic-services/credentials
            echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > ~/magic-services/credentials/google.json
            cd ~/magic-services
            git checkout main
            git pull origin main
            pkill -f "python main.py" || true
            source .venv/bin/activate
            echo "GOOGLE_CREDENTIALS_JSON=${{ secrets.GOOGLE_CREDENTIALS_JSON }}" >> .env.production
            cp .env.production .env
      - name: Restart always-on task
        run: |
          curl -X POST "https://www.pythonanywhere.com/api/v0/user/${{ secrets.PYTHONANYWHERE_USERNAME }}/always_on/" \
            -H "Authorization: Token ${{ secrets.PYTHONANYWHERE_API_TOKEN }}"
      - name: Notify
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=6475885611" \
            -d "text=🚀 Deploy PRODUCCIÓN completado - $(date +'%H:%M')"
