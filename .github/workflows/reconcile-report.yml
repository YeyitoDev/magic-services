name: "🔎 Reporte de Reconciliación (Grupo ↔ BD)"

# Solo manual. Modo reporte = solo lectura. Modo eliminar = expulsa sin registro + vencidos.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente"
        required: true
        default: "production"
        type: choice
        options: ["testing", "production"]
      mode:
        description: "Modo"
        required: true
        default: "reporte"
        type: choice
        options: ["reporte", "eliminar"]

jobs:
  reconcile-report:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt

      - name: Create .env
        run: |
          cat > .env << EOF
          ENVIRONMENT=${{ github.event.inputs.environment || 'production' }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_VALIDATOR_IDS=${{ secrets.TELEGRAM_VALIDATOR_IDS }}
          TELEGRAM_VIP_GROUP_ID=${{ secrets.TELEGRAM_VIP_GROUP_ID }}
          DB_ENGINE=mysql+pymysql
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_PORT=3306
          TIMEZONE=America/Lima
          TELETHON_API_ID=${{ secrets.TELETHON_API_ID }}
          TELETHON_API_HASH=${{ secrets.TELETHON_API_HASH }}
          TELETHON_SESSION=${{ secrets.TELETHON_SESSION }}
          EOF

      - name: Run reconciliation report
        if: github.event.inputs.mode == 'reporte'
        run: python -m jobs.reconcile_report

      - name: Run cleanup (expulsar sin registro + vencidos)
        if: github.event.inputs.mode == 'eliminar'
        run: |
          python -c "
          import asyncio
          from core.container import container
          from services.telegram_api import TelegramAPIService
          from jobs.subscription_cleanup import SubscriptionCleanupJob

          container.initialize_defaults()
          job = SubscriptionCleanupJob(
              telegram_api=TelegramAPIService(),
              subscription_service=container.resolve('subscription_service'),
              user_service=container.resolve('user_service'),
          )
          result = asyncio.run(job.run(mode='eliminar', validate_special_clients=False))
          print(result)
          "

      - name: Save report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reconcile-report-${{ github.run_id }}
          path: output/
          retention-days: 7
