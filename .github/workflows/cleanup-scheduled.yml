name: "🧹 Limpieza de Suscripciones"

on:
  schedule:
    - cron: "0 1 * * *" # Diario 1am UTC = 8pm Lima
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente"
        required: true
        default: "testing"
        type: choice
        options: ["testing", "production"]
      mode:
        description: "Modo"
        required: true
        default: "validar"
        type: choice
        options: ["validar", "eliminar"]

jobs:
  cleanup:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'testing' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          cat > .env << EOF
          ENVIRONMENT=${{ github.event.inputs.environment || 'testing' }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_VALIDATOR_IDS=${{ secrets.TELEGRAM_VALIDATOR_IDS }}
          TELEGRAM_VIP_GROUP_ID=${{ secrets.TELEGRAM_VIP_GROUP_ID }}
          DB_ENGINE=mysql+pymysql
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_PORT=3306
          TIMEZONE=America/Lima
          GOOGLE_CREDENTIALS_JSON=${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          EOF

      - name: Run cleanup
        run: python -m jobs.subscription_cleanup ${{ github.event.inputs.mode || 'validar' }}

      - name: Save logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cleanup-logs-${{ github.run_id }}
          path: |
            output/
            logs/
          retention-days: 30

      - name: Notify Telegram with results
        if: always()
        run: |
          ENV="${{ github.event.inputs.environment || 'testing' }}"
          MODE="${{ github.event.inputs.mode || 'validar' }}"

          # Count results from output files
          TOTAL="?"
          EXPIRED="?"
          KICKED="?"

          if [ -f output/*/resumen_*.txt ]; then
            TOTAL=$(grep "Total Usuarios" output/*/resumen_*.txt 2>/dev/null | tail -1 | awk '{print $NF}' || echo "?")
            EXPIRED=$(grep "Expirad" output/*/resumen_*.txt 2>/dev/null | tail -1 | awk '{print $NF}' || echo "?")
          fi
          if [ -f output/*/eliminados_*.json ]; then
            KICKED=$(python -c "import json; d=json.load(open('output/'+__import__('os').listdir('output')[0]+'/eliminados_'+[f for f in __import__('os').listdir('output/'+__import__('os').listdir('output')[0]) if 'eliminados' in f][0])); print(d['total_eliminados'])" 2>/dev/null || echo "0")
          fi

          if [ "$MODE" = "validar" ]; then
            ICON="🔍"
          else
            ICON="🚨"
          fi

          MSG="${ICON} Limpieza [${ENV}] [${MODE}]
          ├ 👥 Total: ${TOTAL}
          ├ ❌ Expirados: ${EXPIRED}
          └ 🚫 Eliminados: ${KICKED}
          🕐 $(date +'%Y-%m-%d %H:%M')"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=6475885611" \
            -d "text=${MSG}"
