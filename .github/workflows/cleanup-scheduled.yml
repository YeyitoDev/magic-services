name: Scheduled - Limpieza de Suscripciones

on:
  schedule:
    - cron: '0 1 * * *'  # Diario 1am UTC = 8pm Lima
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo'
        required: true
        default: 'validar'
        type: choice
        options: ['validar', 'eliminar']

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with: { python-version: '3.12' }

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Create .env
      run: |
        cat > .env << EOF
        ENVIRONMENT=testing
        TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
        DB_ENGINE=mysql+pymysql
        DB_USER=${{ secrets.DB_USER }}
        DB_PASSWORD=${{ secrets.DB_PASSWORD }}
        DB_HOST=${{ secrets.DB_HOST }}
        DB_NAME=${{ secrets.DB_NAME }}
        DB_PORT=3306
        TIMEZONE=America/Lima
        GOOGLE_CREDENTIALS_JSON=${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        EOF

    - name: Run cleanup
      run: python -m jobs.subscription_cleanup ${{ github.event.inputs.mode || 'validar' }}

    - name: Notify Telegram
      if: always()
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=6475885611" \
          -d "text=🧹 Limpieza suscripciones completada - $(date +'%Y-%m-%d %H:%M')"
