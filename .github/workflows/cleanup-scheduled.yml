name: "🧹 Limpieza de Suscripciones"

on:
  schedule:
    - cron: "0 12 * * *" # Diario 12pm UTC = 7am Lima
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente"
        required: true
        default: "testing"
        type: choice
        options: ["testing", "production"]
      mode:
        description: "Modo"
        required: true
        default: "eliminar"
        type: choice
        options: ["validar", "eliminar"]

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: ${{ github.event_name == 'schedule' && 'production' || github.event.inputs.environment || 'production' }}
    env:
      DEFAULT_MODE: ${{ github.event.inputs.mode || 'eliminar' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          cat > .env << EOF
          ENVIRONMENT=${{ github.event_name == 'schedule' && 'production' || github.event.inputs.environment || 'production' }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_VALIDATOR_IDS=${{ secrets.TELEGRAM_VALIDATOR_IDS }}
          TELEGRAM_VIP_GROUP_ID=${{ secrets.TELEGRAM_VIP_GROUP_ID }}
          DB_ENGINE=mysql+pymysql
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_PORT=3306
          TIMEZONE=America/Lima
          GOOGLE_CREDENTIALS_JSON=${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          TELETHON_API_ID=${{ secrets.TELETHON_API_ID }}
          TELETHON_API_HASH=${{ secrets.TELETHON_API_HASH }}
          TELETHON_SESSION=${{ secrets.TELETHON_SESSION }}
          EOF

      - name: Run cleanup (DB only)
        if: env.DEFAULT_MODE == 'validar'
        run: |
          python -c "
          from core.container import container
          from services.telegram_api import TelegramAPIService
          from jobs.subscription_cleanup import SubscriptionCleanupJob

          container.initialize_defaults()
          job = SubscriptionCleanupJob(
              telegram_api=TelegramAPIService(),
              subscription_service=container.resolve('subscription_service'),
              user_service=container.resolve('user_service'),
          )
          job.run_db_only(mode='validar')
          "

      - name: Run cleanup (with Telethon group check)
        if: env.DEFAULT_MODE == 'eliminar'
        run: |
          python -c "
          import asyncio
          from core.container import container
          from services.telegram_api import TelegramAPIService
          from jobs.subscription_cleanup import SubscriptionCleanupJob

          container.initialize_defaults()
          job = SubscriptionCleanupJob(
              telegram_api=TelegramAPIService(),
              subscription_service=container.resolve('subscription_service'),
              user_service=container.resolve('user_service'),
          )
          result = asyncio.run(job.run(mode='eliminar', validate_special_clients=False))
          print(result)
          "

      - name: Generate Excel report
        if: always()
        run: |
          python -c "
          import glob, json, os, pandas as pd
          from openpyxl import load_workbook

          dirs = sorted(glob.glob('output/*'))
          if not dirs:
              print('No output dir'); exit(0)
          report_dir = dirs[-1]
          today = os.path.basename(report_dir)
          excel_path = os.path.join(report_dir, f'limpieza_{today}.xlsx')

          with pd.ExcelWriter(excel_path, engine='openpyxl') as writer:
              # 1. Summary from JSON
              for jf in sorted(glob.glob(f'{report_dir}/*.json')):
                  with open(jf) as f:
                      data = json.load(f)
                  stats = data.get('resumen_general') or data.get('stats', {})
                  if stats:
                      df = pd.DataFrame([
                          {'Metric': k, 'Value': v if not isinstance(v, list) else len(v)}
                          for k, v in stats.items()
                      ])
                      df.to_excel(writer, sheet_name='Resumen', index=False)
                      break

              # 2. CSV files as sheets
              for cf in sorted(glob.glob(f'{report_dir}/*.csv')):
                  df = pd.read_csv(cf)
                  sheet_name = os.path.basename(cf).replace('.csv', '')[:31]
                  df.to_excel(writer, sheet_name=sheet_name, index=False)

              # 3. Expired users from JSON (DB-only mode)
              for jf in sorted(glob.glob(f'{report_dir}/*.json')):
                  with open(jf) as f:
                      data = json.load(f)
                  users = data.get('expired_users')
                  if users:
                      pd.DataFrame(users).to_excel(writer, sheet_name='Expirados', index=False)
                      break

          # Auto-fit columns
          wb = load_workbook(excel_path)
          for ws in wb.worksheets:
              for col in ws.columns:
                  max_len = 0
                  col_letter = col[0].column_letter
                  for cell in col:
                      try:
                          if cell.value:
                              max_len = max(max_len, len(str(cell.value)))
                      except Exception:
                          pass
                  ws.column_dimensions[col_letter].width = min(max_len + 2, 50)
          wb.save(excel_path)
          print(f'Excel generado: {excel_path}')
          "

      - name: Save logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cleanup-logs-${{ github.run_id }}
          path: |
            output/
            logs/
          retention-days: 30

      - name: Send report via Telegram
        if: always()
        run: |
          REPORT_DIR=$(find output -maxdepth 2 -type d | sort | tail -1)
          for f in "$REPORT_DIR"/*.{json,txt,xlsx}; do
            [ -f "$f" ] || continue
            curl -s -F "chat_id=7860625816" -F "document=@$f" \
              "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" | \
              python -c "import sys,json; d=json.load(sys.stdin); print('✓ Sent:', d.get('result',{}).get('document',{}).get('file_name','file'))"
          done

      - name: Notify admin on Telegram
        if: always()
        run: |
          ENV="${{ github.event_name == 'schedule' && 'production' || github.event.inputs.environment || 'production' }}"
          MODE="${{ github.event.inputs.mode || 'eliminar' }}"

          # Parse output from DB-only cleanup
          RAW=$(grep -E "Total|Active|Expired|Removed" output/*/resumen_*.txt 2>/dev/null || echo "")
          TOTAL=$(echo "$RAW" | grep "Total" | awk -F': ' '{print $2}' || echo "?")
          ACTIVE=$(echo "$RAW" | grep "Active" | awk -F': ' '{print $2}' || echo "?")
          EXPIRED=$(echo "$RAW" | grep "Expirado\|Expired" | awk -F': ' '{print $2}' || echo "?")
          REMOVED=$(echo "$RAW" | grep "Removed" | awk -F': ' '{print $2}' || echo "0")

          if [ "$MODE" = "validar" ]; then
            ICON="🔍"
          else
            ICON="🚨"
          fi

          MSG="${ICON} Limpieza DB-Only [${ENV}] [${MODE}]
          ├ 👥 Total BD: ${TOTAL}
          ├ ✅ Activos BD: ${ACTIVE}
          ├ ❌ Expirados BD: ${EXPIRED}
          └ 🚫 Eliminados: ${REMOVED}
          🕐 $(date +'%Y-%m-%d %H:%M')

          💡 Usa el workflow 🔎 Reporte de Reconciliación para ver stats del grupo."

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=7860625816" -d "text=${MSG}" -d "parse_mode=Markdown"
