name: "🧹 Limpieza de Suscripciones"

on:
  schedule:
    - cron: "0 12 * * *" # Diario 12pm UTC = 7am Lima
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente"
        required: true
        default: "testing"
        type: choice
        options: ["testing", "production"]
      mode:
        description: "Modo"
        required: true
        default: "eliminar"
        type: choice
        options: ["validar", "eliminar"]

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: ${{ github.event_name == 'schedule' && 'production' || github.event.inputs.environment || 'production' }}
    env:
      DEFAULT_MODE: ${{ github.event.inputs.mode || 'validar' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          cat > .env << EOF
          ENVIRONMENT=${{ github.event_name == 'schedule' && 'production' || github.event.inputs.environment || 'production' }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_BOT_TOKEN_LINKS=${{ secrets.TELEGRAM_BOT_TOKEN_LINKS }}
          TELEGRAM_VALIDATOR_IDS=${{ secrets.TELEGRAM_VALIDATOR_IDS }}
          TELEGRAM_VIP_GROUP_ID=${{ secrets.TELEGRAM_VIP_GROUP_ID }}
          DB_ENGINE=mysql+pymysql
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_PORT=3306
          TIMEZONE=America/Lima
          GOOGLE_CREDENTIALS_JSON=${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          TELETHON_API_ID=${{ secrets.TELETHON_API_ID }}
          TELETHON_API_HASH=${{ secrets.TELETHON_API_HASH }}
          TELETHON_SESSION=${{ secrets.TELETHON_SESSION }}
          EOF

      - name: Run cleanup with group stats
        run: |
          python -c "
          import asyncio, os
          from core.container import container
          from services.telegram_api import TelegramAPIService
          from jobs.subscription_cleanup import SubscriptionCleanupJob

          mode = os.environ['DEFAULT_MODE']
          container.initialize_defaults()
          job = SubscriptionCleanupJob(
              telegram_api=TelegramAPIService(),
              subscription_service=container.resolve('subscription_service'),
              user_service=container.resolve('user_service'),
          )
          result = asyncio.run(job.run(mode=mode, validate_special_clients=False))
          print(result)
          "

      - name: Save logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cleanup-logs-${{ github.run_id }}
          path: |
            output/
            logs/
          retention-days: 30

      - name: Send Excel report via Telegram
        if: always()
        run: |
          XLSX=$(find output -maxdepth 2 -name 'limpieza_*.xlsx' | sort | tail -1)
          if [ -f "$XLSX" ]; then
            curl -s -F "chat_id=7860625816" -F "document=@$XLSX" \
              "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" | \
              python -c "import sys,json; d=json.load(sys.stdin); fn=d.get('result',{}).get('document',{}).get('file_name','file'); ok=d.get('ok'); print('✓ Sent:' if ok else '✗ Failed:', fn)"
          else
            echo 'No Excel file found'
          fi

      - name: Notify admin on Telegram
        if: always()
        run: |
          ENV="${{ github.event_name == 'schedule' && 'production' || github.event.inputs.environment || 'production' }}"
          MODE="${{ github.event.inputs.mode || 'validar' }}"

          # Parse stats from Telethon-generated JSON
          JSON_FILE=$(find output -name 'log_ejecucion_*.json' -maxdepth 2 | sort | tail -1)
          if [ -f "$JSON_FILE" ]; then
            TOTAL=$(python -c "import json,sys; d=json.load(open('$JSON_FILE')); print(d.get('resumen_general',{}).get('total_members',0))")
            ACTIVE=$(python -c "import json,sys; d=json.load(open('$JSON_FILE')); print(d.get('resumen_general',{}).get('active_subs',0))")
            EXPIRED=$(python -c "import json,sys; d=json.load(open('$JSON_FILE')); print(d.get('resumen_general',{}).get('expired_subs',0))")
            SPECIAL=$(python -c "import json,sys; d=json.load(open('$JSON_FILE')); print(d.get('resumen_general',{}).get('special_clients',0))")
            REMOVED=$(python -c "import json,sys; d=json.load(open('$JSON_FILE')); print(d.get('resumen_general',{}).get('removed',0))")
          else
            TOTAL="?"; ACTIVE="?"; EXPIRED="?"; SPECIAL="?"; REMOVED="0"
          fi

          if [ "$MODE" = "validar" ]; then
            HEADER="📊 Reporte de Limpieza (Solo lectura)"
            SEP="───────────────"
          else
            HEADER="� PROCESO DE ELIMINACIÓN 🚨"
            SEP="─────────────────"
          fi

          MSG="${SEP}
          ${HEADER}
          ${SEP}

          � Fecha: $(date +'%Y-%m-%d')
          🕐 Hora: $(date +'%H:%M')

          📊 Estadísticas del Grupo
          ├ 👥 Total en grupo: ${TOTAL}
          ├ ✅ Activos en grupo: ${ACTIVE}
          ├ ❌ Expirados en grupo: ${EXPIRED}
          ├ 🆕 Sin registro BD: ${SPECIAL}
          └ 🚫 Eliminados: ${REMOVED}

          ${SEP}"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=7860625816" -d "text=${MSG}" -d "parse_mode=Markdown"
