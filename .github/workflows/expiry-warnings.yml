name: "⚠️ Avisos de Vencimiento"

on:
  schedule:
    - cron: "0 13 * * *" # 1pm UTC = 8am Lima
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente"
        required: true
        default: "testing"
        type: choice
        options: ["testing", "production"]
      days:
        description: "Días antes del vencimiento"
        required: true
        default: "3"
        type: choice
        options: ["1", "3", "5", "7"]

jobs:
  expiry-warning:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'schedule' && 'production' || github.event.inputs.environment || 'production' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt

      - name: Create .env
        run: |
          cat > .env << EOF
          ENVIRONMENT=${{ github.event_name == 'schedule' && 'production' || github.event.inputs.environment || 'production' }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          DB_ENGINE=mysql+pymysql
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_PORT=3306
          TIMEZONE=America/Lima
          EOF

      - name: Send expiry warnings
        run: python -m jobs.expiry_warnings --days "${{ github.event.inputs.days || '3' }}"

      - name: Save report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expiry-warnings-${{ github.run_id }}
          path: output/
          retention-days: 7
